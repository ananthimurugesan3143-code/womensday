<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

h1{
  color:#d63384;
  margin-top:20px;
}

.message{
  font-size:18px;
  color:#333;
  margin:20px;
  display:none;
}

button{
  padding:12px 25px;
  font-size:18px;
  background:#d63384;
  color:white;
  border:none;
  border-radius:25px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#b0256f;
}

.slideshow{
  margin-top:20px;
}

.slideshow img{
  width: 100%;
  height: auto;
  border-radius: 15px;
}
</style>

</head>

<body>

<h1>🌸 Happy Women's Day 🌸</h1>

<button onclick="showMessage()">Click for Surprise</button>

<div class="message" id="msg">
You are strong, beautiful and inspiring 💖  
Thank you for being such an amazing person in my life ✨
</div>

<br>

<button onclick="playSong()">▶ Play Song</button>

<audio id="song">
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="slideshow">
  <img id="slide" src="photo1.jpg">
</div>

<script>

function showMessage(){
  document.getElementById("msg").style.display="block";
}

function playSong(){
  document.getElementById("song").play();
}

let photos=[
"photo1.jpeg",
"photo2.jpeg",
"photo3.jpeg",
"photo4.jpeg",
"photo5.jpeg",
"photo6.jpeg",
"photo7.jpeg",
"photo8.jpeg",
"photo9.jpeg",
"photo10.jpeg"
];

let i=0;

setInterval(function(){
  i++;
  if(i>=photos.length){
    i=0;
  }
  document.getElementById("slide").src=photos[i];
},3000);

</script>

</body>
</html>
